# Direct port of LeuAlmeida/workstation's scripts/apple/macosx.sh tool inventory.
# Generated by `fanout init --from-workstation`.
# Attribution: https://github.com/LeuAlmeida/workstation (MIT).

version: 1

profiles:
  default: [base, shell, web, mobile, cloud, dev_tools, db_tools, productivity, browsers, fonts]

modules:
  base:
    brew:
      - python
    curl:
      - name: nvm
        marker: "~/.nvm/nvm.sh"
        install: "curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash"

  shell:
    brew:
      - zsh
    curl:
      - name: oh-my-zsh
        marker: "~/.oh-my-zsh"
        install: 'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended'

  web:
    npm_global:
      - typescript
      - yarn
      - create-react-app
      - gatsby-cli
      - vercel
      - n8n

  mobile:
    npm_global:
      - react-native-cli
      - expo-cli

  cloud:
    brew:
      - awscli
      - awsebcli
      - kubectl
      - heroku/brew/heroku
    cask:
      - docker

  dev_tools:
    cask:
      - visual-studio-code
      - reactotron
      - insomnia
      - hyper
      - anaconda

  db_tools:
    cask:
      - dbeaver-community
      - sequel-pro
      - robo-3t
      - postbird

  productivity:
    cask:
      - discord
      - openoffice
      - spotify
      - gimp

  browsers:
    cask:
      - google-chrome

  fonts:
    cask:
      - font-fira-code

settings:
  apply:
    parallelism: 4
    timeout: 900
    snapshot_before: true
