version: 1

# Default profile assembles every module. Pick a smaller profile (or build your
# own) to install less. Edit modules freely — that's the point.
profiles:
  default: [base, shell, web, cloud, tools, fonts]
  minimal: [base, shell]
  python-ml: [base, shell, python, ml]
  web: [base, shell, web]

modules:
  base:
    brew:
      - git
      - jq
      - ripgrep
      - fzf

  shell:
    brew:
      - zsh
    curl:
      - name: oh-my-zsh
        marker: "~/.oh-my-zsh"
        install: 'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended'

  python:
    brew:
      - python
    curl:
      - name: nvm
        marker: "~/.nvm/nvm.sh"
        install: "curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash"
    pip:
      - virtualenv
      - poetry
      - ruff

  ml:
    pip:
      - jupyter

  web:
    brew:
      - node
    npm_global:
      - typescript
      - yarn

  cloud:
    brew:
      - awscli
      - kubectl
    cask:
      - docker

  tools:
    cask:
      - visual-studio-code
      - insomnia
      - dbeaver-community
      - google-chrome

  fonts:
    cask:
      - font-fira-code

settings:
  apply:
    parallelism: 4
    timeout: 900
    snapshot_before: true

  verify:
    checks:
      - cmd: "git --version"
      - cmd: "jq --version"
